name: Release CPA Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build linux/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
            packages: ""
            cc: gcc
          - goarch: arm64
            runner: ubuntu-24.04-arm
            packages: ""
            cc: gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential zip ${{ matrix.packages }}

      - name: Build plugin archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          goarch="${{ matrix.goarch }}"
          artifact="auth-concurrency-limiter_${version}_linux_${goarch}.zip"

          mkdir -p dist

          go test .

          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH="${goarch}"
          export CC="${{ matrix.cc }}"

          mkdir -p build
          go build -trimpath -buildmode=c-shared -o build/auth-concurrency-limiter.so .
          rm -f build/auth-concurrency-limiter.h
          cd build
          zip -9 "../dist/${artifact}" auth-concurrency-limiter.so

          test -f "../dist/${artifact}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-linux-${{ matrix.goarch }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download plugin archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
